<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Sandi | Mental Health Care</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts CDN -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- icon web -->
    <link
      rel="icon"
      type="image/png"
      href="../assets/image/logo_brand-removebg-preview.png"
    />
    <!-- Lupa Sandi JS -->
    <script type="module" src="../assets/js/pages/lupa_sandi.js" defer></script>
  </head>
  <body
    class="min-h-screen bg-[#f8f8f8] flex items-center justify-center font-[Poppins]"
  >
    <div class="w-full max-w-md rounded-3xl p-4 m-4">
      <div class="flex justify-center mb-6">
        <img
          src="../assets/image/logo_brand-removebg-preview.png"
          class="w-16 h-16 object-contain"
          alt="Logo"
        />
      </div>

      <h1 class="text-2xl font-semibold text-center mb-2 text-gray-800">
        Lupa Kata Sandi?
      </h1>
      <p class="text-center text-gray-500 mb-8 text-sm px-4">
        Jangan khawatir! Masukkan emailmu di bawah dan kami akan mengirimkan
        instruksi untuk mengatur ulang kata sandimu.
      </p>

      <form
        id="forgotPasswordForm"
        class="space-y-8"
        action="reset_password.html"
      >
        <div class="relative mb-2">
          <label
            for="email"
            class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1 mb-2 block"
            >Alamat Email</label
          >
          <input
            id="email"
            type="email"
            placeholder="Email"
            required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#f2ca4b] bg-gray-50 transition-all"
          />
          <span
            id="emailError"
            class="text-xs text-red-500 absolute bottom-[-24px] left-2 hidden"
            >Email tidak ditemukan</span
          >
        </div>

        <button
          type="submit"
          class="w-full py-3 mt-6 bg-slate-900 text-white rounded-xl font-medium transition shadow-lg shadow-gray-900/20 hover:bg-slate-800 cursor-pointer active:scale-[0.98]"
        >
          Pulihkan Akun
        </button>
      </form>

      <div class="text-center mt-8 text-sm text-gray-500">
        Butuh bantuan lebih lanjut?
        <a
          href="#"
          class="relative text-black font-semibold after:content-[''] after:absolute after:left-1/2 after:-translate-x-1/2 after:bottom-[-2px] after:h-[2px] after:w-0 after:bg-[#f2ca4b] after:transition-all after:duration-300 hover:after:w-full font-['Poppins']"
        >
          Hubungi Dukungan
        </a>
      </div>
    </div>
  </body>
</html>
