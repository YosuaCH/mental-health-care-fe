<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atur Ulang Sandi | Mental Health Care</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="../assets/image/logo_brand-removebg-preview.png"
    />
    <script
      type="module"
      src="../assets/js/pages/reset_password.js"
      defer
    ></script>
  </head>
  <body
    class="min-h-screen bg-[#f8f8f8] flex items-center justify-center font-[Poppins]"
  >
    <div class="w-full max-w-md rounded-3xl p-4 m-4">
      <div class="flex justify-center mb-6">
        <img
          src="../assets/image/logo_brand-removebg-preview.png"
          class="w-16 h-16 object-contain"
          alt="Logo"
        />
      </div>

      <h1 class="text-2xl font-semibold text-center mb-2 text-gray-800">
        Buat Sandi Baru
      </h1>
      <p class="text-center text-gray-500 mb-8 text-sm px-4">
        Masukkan kata sandi baru yang kuat untuk melindungi akunmu.
      </p>

      <form id="resetPasswordForm" class="space-y-8">
        <div class="relative mb-2">
          <label
            class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1 mb-2 block"
            >Kata Sandi Baru</label
          >
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="Minimal 8 karakter"
              required
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#f2ca4b] bg-gray-50 transition-all"
            />
            <button
              type="button"
              onclick="togglePassword('password', 'eyeClosed1', 'eyeOpen1')"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black transition cursor-pointer"
            >
              <svg
                id="eyeClosed1"
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.956 9.956 0 012.042-3.368M3 3l18 18M6.223 6.223A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.543 7a9.97 9.97 0 01-4.132 5.411"
                />
              </svg>
              <svg
                id="eyeOpen1"
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5 hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
          <span
            id="passwordError"
            class="text-xs text-red-500 absolute bottom-[-22px] left-2 hidden"
            >Kata sandi tidak boleh kosong</span
          >
        </div>

        <div class="relative">
          <label
            class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1 mb-2 mt-6 block"
            >Konfirmasi Kata Sandi</label
          >
          <div class="relative">
            <input
              id="confirmPassword"
              type="password"
              placeholder="Ulangi kata sandi"
              required
              class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#f2ca4b] bg-gray-50 transition-all"
            />
            <button
              type="button"
              onclick="
                togglePassword('confirmPassword', 'eyeClosed2', 'eyeOpen2')
              "
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black transition cursor-pointer"
            >
              <svg
                id="eyeClosed2"
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.956 9.956 0 012.042-3.368M3 3l18 18M6.223 6.223A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.543 7a9.97 9.97 0 01-4.132 5.411"
                />
              </svg>
              <svg
                id="eyeOpen2"
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5 hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
          <span
            id="matchError"
            class="text-xs text-red-500 absolute bottom-[-22px] left-2 hidden"
            >Kata sandi tidak cocok</span
          >
        </div>

        <button
          type="submit"
          class="w-full py-3 bg-slate-900 text-white rounded-xl font-medium transition shadow-lg shadow-gray-900/20 hover:bg-slate-800 cursor-pointer active:scale-[0.98]"
        >
          Simpan Sandi Baru
        </button>
      </form>
    </div>
  </body>
</html>
